<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> INCA S.A. - Panel </title>
    <link rel="stylesheet" href="css/var.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="panel">
    <div class="panel-layout">
        <nav class="side-areas" id="sidebarAreas"></nav>
        <aside class="side-secciones" id="sidebarSecciones">
            <div class="side-head">
                <span class="side-empresa">INCA S.A.</span>
            </div>
            <div class="side-nav" id="sidebarNav"></div>
            <div class="side-perfil" id="sidebarPerfil"></div>
        </aside>

        <main class="contenido-main">
            <header class="topbar" id="topbar">
                <div class="top-izq">
                    <span class="top-icon">📥</span>
                    <h2 class="top-title" id="vistaTitulo"> Bandeja de Entrada </h2>
                </div>
                <div class="top-der">
                    <div class="filtros-grupo" id="filtrosGrupo">
                        <button class="btn-filtro activo" data-filtro="todos" title="Todos">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                            </svg>
                            Todos
                        </button>
                        <button class="btn-filtro" data-filtro="pendientes" title="Pendientes">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                            Pendientes
                        </button>
                        <button class="btn-filtro" data-filtro="aprobados" title="Aprobados">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                            Aprobados
                        </button>
                        <button class="btn-filtro" data-filtro="rechazados" title="Rechazados">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                            Rechazados
                        </button>
                    </div>
                    <button class="btn-redactar" id="btnRedactar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="vista-contenido">
                <section class="vista-seccion" id="vista-inbox">
                    <div class="lista-mensaje" id="listaMensaje"></div>
                </section>
                <section class="vista-seccion" id="vista-enviados" hidden>
                    <div class="lista-mensaje" id="listaMensajeEnviados"></div>
                </section>
                <section class="vista-seccion" id="vista-detalle" hidden>
                    <div class="detalle-mensaje" id="mensajeDetalle"></div>
                </section>
                <section class="vista-seccion vista-llamada-seccion" id="vista-llamada" hidden>
                    <div id="vistaLlamada" class="llamada-contenedor"></div>
                </section>
            </div>
        </main>
    </div>

    <div class="modal-over" id="modalOverlay" hidden>
        <div class="cont-modal" id="modalRedactar">
            <div class="modal-head">
                <h3 class="modal-title"> Nuevo Mensaje </h3>
                <button class="modal-cerrar" id="modalCerrar" aria-label="Cerrar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form class="modal-form" id="formRedactar" novalidate>
                <div class="form-grupo">
                    <label class="form-label" for="msgPara"> Para </label>
                    <select class="form-select" id="msgPara" required>
                        <option value="" disabled selected> Seleccionar Destinatario </option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label class="form-label" for="msgAsunto"> Asunto </label>
                    <input class="form-input" type="text" id="msgAsunto" placeholder="Asunto del mensaje" required/>
                </div>
                <div class="form-grupo">
                    <label class="form-label" for="msgContenido"> Mensaje </label>
                    <textarea class="form-textarea" id="msgContenido" placeholder="Escribí tu mensaje..." rows="5" required></textarea>
                </div>
                <div class="form-grupo">
                    <label class="form-label" for="msgAdjunto"> Adjuntos </label>
                    <div class="adjunto-area" id="adjuntoArea">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                        <span> Adjuntar Archivo </span>
                        <input type="file" id="msgAdjunto" multiple hidden>
                    </div>
                    <div class="lista-adjuntos" id="adjuntosLista"></div>
                </div>
                <div class="auth-error" id="modalError" hidden>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="modalErrorText"> Complete todos los campos </span>
                </div>
                <div class="modal-acciones">
                    <button type="button" class="btn-secundario" id="btnCancelar"> Cancelar </button>
                    <button type="submit" class="btn-login" id="btnEnviar"> Enviar mensaje </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./assents/app.js"></script>
</body>
</html>
