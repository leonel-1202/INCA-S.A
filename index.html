<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> INCA S.A. - Iniciar Sesión </title>
    <link rel="stylesheet" href="css/var.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-fondo"></div>
    <div class="auth-contenido">
        <div class="auth-tarjeta">
            <div class="auth-cabeza">
                <div class="auth-logo">
                    <span>I</span>
                </div>
                <h1 class="auth-titulo"> INCA S.A. </h1>
                <p class="auth-subtitulo"> Sistema de Gestión Colaborativa </p>
            </div>

            <form class="auth-form" id="loginForm" novalidate>
                <div class="form-grupo">
                    <label class="form-label" for="inputUsuario"> Usuario </label>
                    <select class="form-select" id="inputUsuario" required>
                        <option value="" disabled selected> Selecciona tu área </option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="inputContraseña"> Contraseña </label>
                    <div class="inputContenido">
                        <input
                            class="form-input"
                            type="password"
                            id="inputContraseña"
                            placeholder="Ingresa tu contraseña"
                            required
                            autocomplete="current-password"
                        />
                        <button type="button" class="btn-toggle-contraseña" id="btnTogglePass" aria-label="Mostrar Contraseña">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="auth-error" id="authError" hidden>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="authErrorText"> Contraseña incorrecta. </span>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    Iniciar Sesión
                </button>
            </form>
        </div>

        <p class="auth-footer"> INCA S.A. © 2026 — Uso interno </p>
    </div>

    <script type="module">

        import { estaLogueado } from './assents/services/auth.service.js';
        
        if (estaLogueado()) {
            window.location.replace('dashboard.html');
}

        import { USUARIOS } from './assents/data/users.js';
        import { login } from './assents/services/auth.service.js';

        const select = document.getElementById('inputUsuario');
        USUARIOS.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = `${u.nombre} — ${u.area}`;
            select.appendChild(opt);
        });

        const inputPass = document.getElementById('inputContraseña');
        const btnToggle = document.getElementById('btnTogglePass');
        btnToggle.addEventListener('click', () => {
            const esPassword = inputPass.type === 'password';
            inputPass.type = esPassword ? 'text' : 'password';
            btnToggle.classList.toggle('active', esPassword);
        });

        const errorBox  = document.getElementById('authError');
        const errorText = document.getElementById('authErrorText');
        const btnLogin  = document.getElementById('btnLogin');

        function mostrarError(msg) {
            errorText.textContent = msg;
            errorBox.hidden = false;
            inputPass.classList.add('input-error');
        }

        function ocultarError() {
            errorBox.hidden = true;
            inputPass.classList.remove('input-error');
        }

        inputPass.addEventListener('input', ocultarError);
        select.addEventListener('change', ocultarError);

        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();

            const userId   = select.value;
            const password = inputPass.value.trim();

            btnLogin.textContent = 'Iniciando sesión...';
            btnLogin.disabled    = true;

            const resultado = await login(userId, password);

            if (!resultado.ok) {
                mostrarError(resultado.error);
                inputPass.value      = '';
                inputPass.focus();
                btnLogin.textContent = 'Iniciar Sesión';
                btnLogin.disabled    = false;
                return;
            }

            window.location.replace('dashboard.html');
        });
    </script>
</body>
</html>
